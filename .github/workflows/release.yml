name: Release

on:
    push:
        branches:
            - main
    workflow_dispatch: # allow manual trigger via `just release` or GitHub UI

# Allow only one concurrent release run; do not cancel an in-flight publish.
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write # create tags, commits, and GitHub releases
    issues: write # comment on released issues
    pull-requests: write # comment on released PRs
    id-token: write # npm provenance via OIDC

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # full history + tags for semantic-release
                  persist-credentials: false

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint

            - name: Build
              run: pnpm run build

            - name: Test
              run: pnpm test

            - name: Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm exec semantic-release
