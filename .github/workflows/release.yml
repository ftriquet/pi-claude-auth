name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+" # only publish on valid semver tags

# Allow only one concurrent release; never cancel an in-flight publish.
concurrency:
    group: release-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: write # create GitHub releases
    id-token: write # npm provenance via OIDC

jobs:
    publish:
        name: Publish
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0 # full history so --generate-notes spans all commits

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Lint
              run: pnpm run lint

            - name: Build
              run: pnpm run build

            - name: Test
              run: pnpm test

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NPM_CONFIG_PROVENANCE: "true"
              run: pnpm publish --no-git-checks

            - name: Create GitHub Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ github.ref_name }}" \
                    --title "${{ github.ref_name }}" \
                    --generate-notes
